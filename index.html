<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WAVL 18-0</title>
  <link rel="stylesheet" href="style.css">
  <script src="players.js"></script>
  <script src="script.js" defer></script>
</head>
<body>
  <header>
    <h1>🏐 WAVL 18-0</h1>
    <p>Build the Ultimate West Australian Volleyball Team</p>
  </header>

  <div class="container">
    <aside class="team-panel">
      <div class="team-panel__intro">
        <h2>Your Team</h2>
        <p>Volleyball Court</p>
      </div>
    </aside>

    <main class="draft-panel">
      <div class="draft-panel__controls">
        <h2 id="clubName">Press Spin</h2>
        <button id="spinButton">🎡 SPIN CLUB</button>
      </div>

      <div class="player-shell">
        <div id="playerContainer"></div>
      </div>
    </main>
  </div>

  <div class="app-footer-bar">
    <a class="play-again-btn" href="index.html">PLAY AGAIN</a>
    <footer>
      WAVL 18-0 Alpha
    </footer>
  </div>
</body>
</html>
